<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Populate Firestore - MLT</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
  button { padding: 10px 20px; margin: 5px; cursor: pointer; }
  .success { color: green; }
  .error { color: red; }
  .log { background: #f5f5f5; padding: 10px; margin: 10px 0; max-height: 400px; overflow-y: auto; }
</style>
</head>
<body>
<h1>Populate Firestore with Sample Data</h1>
<p>This will add sample teams, players, matches, tournaments, and news to your Firestore database.</p>
<button onclick="populateData()">Populate Data</button>
<button onclick="clearData()">Clear All Data</button>
<div id="log" class="log"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDrU-nINRAvMl5t_beZEPkfMjZ5uVE9T_8",
  authDomain: "mlt-site.firebaseapp.com",
  projectId: "mlt-site",
  storageBucket: "mlt-site.appspot.com",
  messagingSenderId: "305436045302",
  appId: "1:305436045302:web:04165a39ec32106051e1d7",
  measurementId: "G-5F51F03G4W"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function log(msg, type = 'info') {
  const logDiv = document.getElementById('log');
  const color = type === 'success' ? 'green' : type === 'error' ? 'red' : 'black';
  logDiv.innerHTML += `<div style="color: ${color}">${msg}</div>`;
  logDiv.scrollTop = logDiv.scrollHeight;
}

async function populateData() {
  try {
    log('Starting data population...', 'info');
    
    // Sample Teams
    const teams = [
      { name: 'Team Alpha', rating: 2.45, winrate: 78, trophies: 3, form: ['W','W','L','W','W'], mapWinrate: { 'Mirage': {wins: 5, losses: 2}, 'Dust2': {wins: 4, losses: 3} }, main: [{id: 'p1', nick: 's1mple', realName: 'Oleksandr'}, {id: 'p2', nick: 'NiKo', realName: 'Nikola'}, {id: 'p3', nick: 'ZywOo', realName: 'Mathias'}, {id: 'p4', nick: 'device', realName: 'Nicolai'}, {id: 'p5', nick: 'dupreeh', realName: 'Peter'}], reserve: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() },
      { name: 'Team Beta', rating: 2.31, winrate: 72, trophies: 2, form: ['W','L','W','L','W'], mapWinrate: { 'Mirage': {wins: 3, losses: 4}, 'Inferno': {wins: 5, losses: 2} }, main: [{id: 'p6', nick: 'Shroud', realName: 'Michael'}, {id: 'p7', nick: 'Skadoodle', realName: 'Tyler'}, {id: 'p8', nick: 'Stewie2k', realName: 'Jake'}, {id: 'p9', nick: 'Autimatic', realName: 'Timothy'}, {id: 'p10', nick: 'Tarik', realName: 'Tarik'}], reserve: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() },
      { name: 'Team Gamma', rating: 2.18, winrate: 65, trophies: 1, form: ['L','L','W','W','L'], mapWinrate: { 'Nuke': {wins: 2, losses: 5}, 'Train': {wins: 3, losses: 4} }, main: [{id: 'p11', nick: 'Fallen', realName: 'Gabriel'}, {id: 'p12', nick: 'Coldzera', realName: 'Marcelo'}, {id: 'p13', nick: 'fer', realName: 'Fernando'}, {id: 'p14', nick: 'TACO', realName: 'Epitacio'}, {id: 'p15', nick: 'fnx', realName: 'Lincoln'}], reserve: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() }
    ];

    for (const team of teams) {
      const docRef = await db.collection('teams').add(team);
      team.id = docRef.id;
      log(`Added team: ${team.name}`, 'success');
    }

    // Sample Players
    const players = [
      { nick: 's1mple', teamId: teams[0].id, weapon: 'AWP', kd: 1.45, adr: 92.5, kast: 78, rating: 1.35, achievements: ['MVP', 'Top 1 Player'], formGraph: [1.2, 1.4, 1.3, 1.5, 1.35], matchIds: [] },
      { nick: 'NiKo', teamId: teams[0].id, weapon: 'AK-47', kd: 1.32, adr: 88.3, kast: 75, rating: 1.28, achievements: ['Top 5 Player'], formGraph: [1.1, 1.3, 1.2, 1.4, 1.32], matchIds: [] },
      { nick: 'ZywOo', teamId: teams[0].id, weapon: 'AK-47', kd: 1.28, adr: 85.7, kast: 73, rating: 1.25, achievements: ['Rising Star'], formGraph: [1.0, 1.2, 1.3, 1.1, 1.28], matchIds: [] },
      { nick: 'device', teamId: teams[0].id, weapon: 'AWP', kd: 1.15, adr: 82.1, kast: 70, rating: 1.18, achievements: [], formGraph: [0.9, 1.1, 1.0, 1.2, 1.15], matchIds: [] },
      { nick: 'dupreeh', teamId: teams[0].id, weapon: 'AK-47', kd: 1.08, adr: 78.4, kast: 68, rating: 1.12, achievements: [], formGraph: [0.8, 1.0, 0.9, 1.1, 1.08], matchIds: [] },
      { nick: 'Shroud', teamId: teams[1].id, weapon: 'M4A4', kd: 1.22, adr: 80.5, kast: 71, rating: 1.20, achievements: ['Streamer'], formGraph: [1.0, 1.2, 1.1, 1.3, 1.22], matchIds: [] },
      { nick: 'Skadoodle', teamId: teams[1].id, weapon: 'AWP', kd: 1.18, adr: 79.2, kast: 69, rating: 1.15, achievements: ['Major Winner'], formGraph: [0.9, 1.1, 1.0, 1.2, 1.18], matchIds: [] },
      { nick: 'Fallen', teamId: teams[2].id, weapon: 'AWP', kd: 1.05, adr: 75.8, kast: 65, rating: 1.08, achievements: ['IGL', 'Major Winner'], formGraph: [0.8, 1.0, 0.9, 1.1, 1.05], matchIds: [] },
      { nick: 'Coldzera', teamId: teams[2].id, weapon: 'AK-47', kd: 1.35, adr: 90.2, kast: 76, rating: 1.30, achievements: ['MVP', 'Top 1 Player'], formGraph: [1.1, 1.3, 1.2, 1.4, 1.35], matchIds: [] },
      { nick: 'fer', teamId: teams[2].id, weapon: 'AK-47', kd: 1.12, adr: 77.6, kast: 67, rating: 1.14, achievements: [], formGraph: [0.9, 1.1, 1.0, 1.2, 1.12], matchIds: [] }
    ];

    for (const player of players) {
      const docRef = await db.collection('players').add(player);
      player.id = docRef.id;
      log(`Added player: ${player.nick}`, 'success');
    }

    // Sample Tournament
    const tournament = {
      name: 'MLT Summer Championship 2026',
      period: 'July 15-20, 2026',
      prizePool: '$10,000',
      status: 'live',
      coverUrl: '',
      regOpen: true,
      registeredTeamIds: [teams[0].id, teams[1].id, teams[2].id],
      bracket: {
        rounds: [
          { name: 'Quarter Finals', matches: [
            { teamA: 'Team Alpha', teamB: 'Team Beta', score: '2-1' },
            { teamA: 'Team Gamma', teamB: 'TBD', score: '' }
          ]},
          { name: 'Semi Finals', matches: [
            { teamA: 'Winner QF1', teamB: 'Winner QF2', score: '' }
          ]},
          { name: 'Grand Final', matches: [
            { teamA: 'Winner SF', teamB: 'TBD', score: '' }
          ]}
        ]
      },
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    const tournamentRef = await db.collection('tournaments').add(tournament);
    tournament.id = tournamentRef.id;
    log(`Added tournament: ${tournament.name}`, 'success');

    // Sample Matches
    const matches = [
      { tournamentId: tournament.id, teamA: teams[0].id, teamB: teams[1].id, format: 'BO3', startAt: Date.now() - 3600000, status: 'live', streamUrl: '', score: [1, 1], maps: [{ name: 'Mirage', score: [16, 14], winnerTeamId: teams[0].id, playerStats: {} }, { name: 'Dust2', score: [12, 16], winnerTeamId: teams[1].id, playerStats: {} }] },
      { tournamentId: tournament.id, teamA: teams[1].id, teamB: teams[2].id, format: 'BO3', startAt: Date.now() + 7200000, status: 'upcoming', streamUrl: '', score: null, maps: [] },
      { tournamentId: tournament.id, teamA: teams[0].id, teamB: teams[2].id, format: 'BO1', startAt: Date.now() - 86400000, status: 'finished', streamUrl: '', score: [16, 12], maps: [{ name: 'Inferno', score: [16, 12], winnerTeamId: teams[0].id, playerStats: {} }] }
    ];

    for (const match of matches) {
      const docRef = await db.collection('matches').add(match);
      match.id = docRef.id;
      log(`Added match: ${teams.find(t => t.id === match.teamA)?.name} vs ${teams.find(t => t.id === match.teamB)?.name}`, 'success');
    }

    // Sample News
    const news = [
      { title: 'MLT Summer Championship Started', excerpt: 'The biggest tournament of the year has begun with 8 teams competing for $10,000 prize pool.', body: 'Full article content here...', tag: 'Tournament', imageUrl: '', publishedAt: firebase.firestore.FieldValue.serverTimestamp() },
      { title: 'Team Alpha Dominates Group Stage', excerpt: 'Team Alpha shows incredible form with 3-0 record in group stage.', body: 'Full article content here...', tag: 'Match', imageUrl: '', publishedAt: firebase.firestore.FieldValue.serverTimestamp() },
      { title: 'New Season Announced', excerpt: 'MLT announces new season with improved format and bigger prizes.', body: 'Full article content here...', tag: 'News', imageUrl: '', publishedAt: firebase.firestore.FieldValue.serverTimestamp() }
    ];

    for (const item of news) {
      await db.collection('news').add(item);
      log(`Added news: ${item.title}`, 'success');
    }

    log('Data population completed successfully!', 'success');
  } catch (error) {
    log(`Error: ${error.message}`, 'error');
  }
}

async function clearData() {
  try {
    log('Clearing all data...', 'info');
    
    const collections = ['teams', 'players', 'matches', 'tournaments', 'news', 'teamRegistrations'];
    
    for (const collection of collections) {
      const snapshot = await db.collection(collection).get();
      for (const doc of snapshot.docs) {
        await doc.ref.delete();
      }
      log(`Cleared collection: ${collection}`, 'success');
    }
    
    log('All data cleared successfully!', 'success');
  } catch (error) {
    log(`Error: ${error.message}`, 'error');
  }
}
</script>
</body>
</html>
